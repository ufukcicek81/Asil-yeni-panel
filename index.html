<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asil Kuyumculuk</title>
<style>
body{margin:0;background:#0b0f17;color:#fff;font-family:Arial}
.hidden{display:none}
.top{display:flex;justify-content:space-between;padding:15px}
.btn{padding:10px 15px;border-radius:20px;border:none;cursor:pointer}
.adminBtn{background:gold;color:#000}
.card{background:#111827;margin:10px;padding:15px;border-radius:15px}
.ticker{overflow:hidden;white-space:nowrap;background:#000;padding:10px}
.ticker span{margin-right:30px;color:gold}
</style>
</head>
<body>

<div id="adminPanel" class="hidden">
  <div class="top">
    <h2>Admin Panel</h2>
    <button class="btn adminBtn" onclick="switchToCustomer()">Müşteri Görünümü</button>
  </div>
  <div id="adminContent"></div>
</div>

<div id="customerPanel">
  <div class="ticker"><div id="ticker"></div></div>
  <div class="top">
    <h2>Asil Kuyumculuk</h2>
  </div>
  <div id="customerContent"></div>
</div>

<script>
const ENDPOINT = "https://altin-proxy.ufuk87900.workers.dev";

function isAdmin(){
  return window.location.search.includes("admin");
}

function switchToCustomer(){
  document.getElementById("adminPanel").classList.add("hidden");
  document.getElementById("customerPanel").classList.remove("hidden");
}

function switchToAdmin(){
  document.getElementById("customerPanel").classList.add("hidden");
  document.getElementById("adminPanel").classList.remove("hidden");
}

function format(v){
  if(!v) return "-";
  let n = Number(String(v).replace(",","."));
  if(!isNaN(n)) return n.toLocaleString("tr-TR")+" ₺";
  return v;
}

function normalize(k){
  return k.toLowerCase().replace(/[^a-z0-9]/g,"");
}

function isCurrency(k){
  return ["usd","usdtry","eur","eurtry","gbp","sterlin"].includes(k);
}

async function load(){
  try{
    let res = await fetch(ENDPOINT);
    let data = await res.json();

    let items = Object.entries(data).map(([k,v])=>({
      key:normalize(k),
      name:k,
      value:(typeof v==="object")?(v.satis||v.price||v):v
    }));

    let gold = items.filter(x=>!isCurrency(x.key));
    let currency = items.filter(x=>isCurrency(x.key));

    // CUSTOMER
    document.getElementById("customerContent").innerHTML =
      gold.map(x=>`<div class="card"><b>${x.name}</b><br>${format(x.value)}</div>`).join("");

    document.getElementById("ticker").innerHTML =
      currency.map(x=>`<span>${x.name}: ${format(x.value)}</span>`).join("");

    // ADMIN
    document.getElementById("adminContent").innerHTML =
      items.map(x=>`<div class="card"><b>${x.name}</b><br>${format(x.value)}</div>`).join("");

  }catch(e){
    console.log(e);
  }
}

if(isAdmin()){
  switchToAdmin();
}else{
  switchToCustomer();
}

load();
setInterval(load,60000);
</script>

</body>
</html>
