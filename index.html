<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asil Kuyumculuk</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#0b0f17,#111827);
  color:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
}

.title{
  font-size:22px;
  font-weight:bold;
}

/* HERO */
.hero{
  padding:20px;
  margin:10px;
  border-radius:20px;
  background:linear-gradient(135deg,#d4af37,#111);
}

.hero h1{
  margin:0;
  font-size:32px;
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:#111827;
  padding:15px;
  border-radius:15px;
}

.price{
  font-size:22px;
  font-weight:bold;
  margin-top:5px;
}

/* TICKER */
.ticker{
  background:#000;
  padding:10px;
  overflow:hidden;
  white-space:nowrap;
}

.ticker span{
  margin-right:30px;
  color:#d4af37;
}

/* ADMIN */
.admin-only{
  display:none;
}

.admin-mode .admin-only{
  display:block;
}

/* RESPONSIVE */
@media(max-width:600px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>

</head>
<body>

<div class="ticker" id="ticker"></div>

<div class="header">
  <div class="title">Asil Kuyumculuk</div>
</div>

<div class="hero">
  <h1 id="heroPrice">—</h1>
  <p id="heroName">Gram Altın</p>
</div>

<div class="grid" id="content"></div>

<!-- ADMIN PANEL -->
<div class="admin-only" style="padding:15px;">
  <h2>Admin Panel</h2>
  <p>Buraya alış / satış ekleyebiliriz</p>
</div>

<script>
const ENDPOINT = "https://altin-proxy.ufuk87900.workers.dev";
const isAdmin = window.location.search.includes("admin");

if(isAdmin){
  document.body.classList.add("admin-mode");
}

// FORMAT
function format(v){
  if(!v) return "-";
  let n = Number(String(v).replace(",","."));
  if(!isNaN(n)) return n.toLocaleString("tr-TR")+" ₺";
  return v;
}

// NORMALIZE
function normalize(k){
  return k.toLowerCase().replace(/[^a-z0-9]/g,"");
}

// DÖVİZ
function isCurrency(k){
  return ["usd","usdtry","eur","eurtry","gbp","sterlin"].includes(k);
}

// LOAD DATA
async function load(){
  try{
    let res = await fetch(ENDPOINT);
    let data = await res.json();

    let items = Object.entries(data).map(([k,v])=>({
      key:normalize(k),
      name:k,
      value:(typeof v==="object")?(v.satis||v.price||v):v
    }));

    let gold = items.filter(x=>!isCurrency(x.key));
    let currency = items.filter(x=>isCurrency(x.key));

    // HERO
    let hero = gold[0];
    document.getElementById("heroPrice").innerText = format(hero.value);
    document.getElementById("heroName").innerText = hero.name;

    // ALTINLAR
    document.getElementById("content").innerHTML =
      gold.map(x=>`
        <div class="card">
          <div>${x.name}</div>
          <div class="price">${format(x.value)}</div>
        </div>
      `).join("");

    // DÖVİZ BANT
    document.getElementById("ticker").innerHTML =
      currency.map(x=>`<span>${x.name}: ${format(x.value)}</span>`).join("");

  }catch(e){
    console.log(e);
  }
}

load();
setInterval(load,60000);
</script>

</body>
</html>
