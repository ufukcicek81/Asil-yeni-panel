<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asil Kuyumcum</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:Arial}
.header{text-align:center;padding:20px;font-size:24px;color:#d4af37}
.row{display:flex;justify-content:space-between;padding:12px;border-bottom:1px solid #333}
</style>
</head>
<body>
<div class="header">ASİL KUYUMCUM</div>
<div id="list"></div>

<script>
const worker="https://altin-proxy.ufuk87900.workers.dev";

function load(){
 fetch(worker)
 .then(r=>r.json())
 .then(d=>{
   const list=document.getElementById("list");
   list.innerHTML=`
   <div class="row"><b>24 Ayar</b><span>${Math.round(d.hasSatis)}</span></div>
   <div class="row"><b>22 Ayar</b><span>${Math.round(d.hasSatis*0.92)}</span></div>
   <div class="row"><b>Gram Altın</b><span>${Math.round(d.hasSatis)}</span></div>
   `;
 });
}
load();
setInterval(load,5000);
</script>
</body>
</html>
